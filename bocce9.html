<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bocce League Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">


<style>
body { font-family: Arial, sans-serif; padding: 20px; }
table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
th, td { border: 1px solid #ddd; padding: 5px; text-align: left; }
th { background-color: #f2f2f2; }
tr:hover { background-color: #f5f5f5; }
.bold { font-weight: bold; }
.game-row { cursor: pointer; }
.selected-row { background-color: #cceeff !important; }

/* Modal */
.modal {
  display: none; position: absolute; z-index: 1000;
  left: 0; top: 0; width: 100%; height: 100%;
  background-color: rgba(0,0,0,0.5);
}
.modal-content {
  background-color: #fff; padding: 1px;
  border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.3);
  position: absolute;
}
.close { float: right; font-size: 24px; cursor: pointer; }

/* Standings grid */
	#bocce-standings-container {
	  all: unset;
	  font-family: Arial, sans-serif; /* reapply only what you want */
	}
	#bocce-standings-container table {
      border-collapse: collapse;
      text-align: center;
      margin: 0 auto;
	}  
    #bocce-standings-container td {
      width: 40px;
      height: 30px;
      border: 1px solid #ccc;
      padding-left: 5px;
      padding-right: 5px;
	  text-align: center;
    }
    #bocce-standings-container .gray-inner {
      width: 100%;
      height: 100%;
      background-color: #71716F;
    }
    #bocce-standings-container .bold {
      font-weight: bold;
    }
	#bocce-standings-container table {
	  width: auto;
	  border-collapse: collapse;
	  margin: 0 auto;
	}
	#bocce-standings-container td {
	  padding: 0 5px;
	}

/* Sticky header for schedule */
.table-wrapper { max-height: 300px; overflow-y: auto; border: 1px solid #ccc; }
.table-wrapper thead th { position: sticky; top: 0; background-color: #f2f2f2; z-index: 1; }
</style>
</head>

<body>

<h1 id="leagueTitle" style="display: flex; align-items: center; gap: 10px;">
		<img src="avalon-bocce-icon-80x80.jpg" alt="Avalon Bocce Icon" style="height: 80px;">
		2026 Summer Bocce Schedule and Standings
	</h1>

<div id="bocce-standings-container"></div>

<div id="scheduleContainer" style="margin-top:20px;">
  <label for="teamFilter">Filter by Team:</label>
  <select id="teamFilter"></select>
  &nbsp;&nbsp;
  <button id="downloadTeamBtn" disabled>Download Team Schedule for Calendar</button>
  &nbsp;&nbsp;
  <button onclick="generateIcs('all')">Download All Games Schedule for Calendar</button>
</div>

<div id="selectionInfo" style="margin-top:10px;">
  <button id="downloadSelected" disabled>Download Selected Game for Calendar</button>
</div>

<div id="tableDisplay"></div>

<!-- Modal -->
<div id="teamModal" class="modal">
  <div class="modal-content" id="modalContent">
    <span class="close" onclick="closeModal()">&times;</span>
    <table id="teamTable"><tbody></tbody></table>
  </div>
</div>

<script>
/* ---------------------------------------------------------
   CONFIG
--------------------------------------------------------- */
const params = new URLSearchParams(window.location.search);
const league = params.get("league") || "2026-summer";

const scheduleFile = `${league}-bocce-schedule.csv`;
const teamsFile    = `${league}-bocce-teams.json`;
const resultsFile  = `results.json`;

/* ---------------------------------------------------------
   GLOBALS
--------------------------------------------------------- */
let games = [];
let teams = [];
let results = [];
let wins = Array(16).fill(0);
let gamesPlayed = 0;
let asOfDate = "";
let selectedGameId = null;
let filteredGames = [];
let teamTitle = "";
const currentDate = new Date().toISOString().split('T')[0]; // "YYYY-MM-DD"


/* ---------------------------------------------------------
   INIT
--------------------------------------------------------- */
init();

async function init() {
  try {
    const [scheduleText, teamsJson, resultsJson] = await Promise.all([
      fetch(scheduleFile, { cache: 'reload' }).then(r => r.text()),
      fetch(teamsFile, { cache: 'reload' }).then(r => r.json()),
      fetch(resultsFile, { cache: 'reload' }).then(r => r.json()).catch(() => ({results: []}))
    ]);

    teams = teamsJson.teams;
	teamTitle = teamsJson.title;
    results = resultsJson.results || [];
	console.log(results);

    //document.getElementById("leagueTitle").textContent = teamsJson.title + " V9.3";

    parseSchedule(scheduleText);
    computeWinsFromResults();
    renderStandings();

    populateTeamFilter();;
	// instead of renderSchedule(games);
	filterSchedule();

	document.getElementById('downloadSelected')
	  .addEventListener('click', () => generateIcs('selected'));

	document.getElementById('downloadTeamBtn')
	  .addEventListener('click', () => generateIcs('team'));
	
	// old code for generating team ics file
	//document.getElementById('downloadTeamBtn')  
	    //.addEventListener('click', () => {
	    //const val = document.getElementById('teamFilter').value;
		//if (!val) { alert('Choose a team first.'); return; }
		//const teamGames = games.filter(g => g.teamA === val || g.teamB === val);
		//if (teamGames.length === 0) { alert('No games for this team.'); return; }
		// reuse generateFilteredICS pattern if you want per‑team ICS,
		// or adapt generateIcs to accept a list.
		//const ics = generateFilteredICS(teamGames); // if you bring that helper over
		//downloadICS(ics, `${val.replace(/\s+/g,'_')}.ics`);
	  //});
	

  } catch (err) {
    console.error("Init error:", err);
  }
}

/* ---------------------------------------------------------
   PARSE SCHEDULE CSV
--------------------------------------------------------- */
function parseSchedule(csvText) {
  const lines = csvText.trim().split(/\r?\n/);
  const dataLines = lines.slice(1);
  let idCounter = 1;

  games = dataLines.map(line => {
    const cols = line.split(',');
    return {
      id: idCounter++,
      teamA: cols[0].trim(),
      teamB: cols[1].trim(),
      date: cols[2].trim(),
      time12: cols[3].trim(),
      time24: convert12To24(cols[3].trim()),
      court: cols[4].trim()
    };
  });
}

function convert12To24(t) {
  // Match HH:MM or HH:MM:SS with AM/PM
  const m = t.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)/i);
  if (!m) return "00:00";

  let hour = parseInt(m[1], 10);
  const minute = m[2];
  const ampm = m[4].toUpperCase();

  if (ampm === "PM" && hour !== 12) hour += 12;
  if (ampm === "AM" && hour === 12) hour = 0;

  return `${String(hour).padStart(2, "0")}:${minute}`;
}

function selectGame(gameId) {
  selectedGameId = gameId;
  const rows = document.querySelectorAll('#tableDisplay .game-row');
  const btn = document.getElementById('downloadSelected');

  rows.forEach(r => {
    r.classList.remove('selected-row');
    if (r.dataset.gameId == gameId) r.classList.add('selected-row');
  });

  if (gameId !== null) {
    btn.disabled = false;
    btn.textContent = `Download Selected Game (${gameId}) (.ics)`;
  } else {
    btn.disabled = true;
    btn.textContent = 'Download Selected Game (.ics)';
  }
}


/* ---------------------------------------------------------
   COMPUTE WINS FROM results.json
--------------------------------------------------------- */
function computeWinsFromResults() {
  wins = Array(16).fill(0);
  gamesPlayed = results.length;

  results.forEach(entry => {
    entry.winners.forEach(teamNum => {
      if (teamNum >= 1 && teamNum <= 16) wins[teamNum - 1]++;
    });
  });

  if (results.length > 0) {
    const last = results[results.length - 1].date; // "20260514"
    asOfDate = `${last.substring(4,6)}/${last.substring(6,8)}/${last.substring(0,4)}`;
  }
}

/* ---------------------------------------------------------
   RENDER STANDINGS
--------------------------------------------------------- */
function renderStandings() {
  const container = document.getElementById("bocce-standings-container");
  container.innerHTML = "";

  const table = document.createElement("table");

  // Title row
  const titleRow = document.createElement("tr");
  titleRow.appendChild(makeCell("Weeks Played", true));
  const titleCell = makeCell(`${teamTitle} ${asOfDate}`, true);
  titleCell.colSpan = teams.length;
  titleRow.appendChild(titleCell);
  table.appendChild(titleRow);

  // Bar rows
  for (let level = gamesPlayed; level >= 1; level--) {
    const row = document.createElement("tr");
    row.appendChild(makeCell(level));
    for (let i = 0; i < teams.length; i++) {
      const td = document.createElement("td");
      if (wins[i] >= level) {
        const bar = document.createElement("div");
        bar.className = "gray-inner";
        td.appendChild(bar);
      }
      row.appendChild(td);
    }
    table.appendChild(row);
  }

  // Team row
  const teamRow = document.createElement("tr");
  teamRow.appendChild(makeCell("Teams", true));
  teams.forEach(t => {
    const td = makeCell(t.team);
	td.onclick = e => showTeamAt(e, "Team " + t.team, "0", null);	
    teamRow.appendChild(td);
  });
  table.appendChild(teamRow);

  container.appendChild(table);
}

function makeCell(text, bold=false) {
  const td = document.createElement("td");
  td.textContent = text;
  if (bold) td.className = "bold";
  return td;
}

/* ---------------------------------------------------------
   TEAM MODAL
--------------------------------------------------------- */
	function showTeamAt(event, team1, team2, gameId) {
	    if (gameId !== null) {
		  selectGame(gameId);
		};
		let maxEntries = 0;
		const tableBody = document.querySelector('#teamTable tbody');
		tableBody.innerHTML = ' '; // Clear previous rows
		if (team2 === "0" ) {
			let header = document.createElement('tr');
			// column 1 header
			const teamA = getTeamObject(team1, teams)
			let col1 = document.createElement('th');
			col1.textContent = `Team ${teamA.team}`;
			header.appendChild(col1);
			tableBody.appendChild(header);  
			
			const maxEntries = teamA.members.length; 
			for (t=0; t < maxEntries; t++) {
				const row = document.createElement('tr');
				const column1 = document.createElement('td');
				column1.textContent = teamA.members[t];	
				row.appendChild(column1);
				tableBody.appendChild(row);
			};	
		  } else {
			const header = document.createElement('tr');
			// column 1 header
			const teamA = getTeamObject(team1, teams)
			const col1 = document.createElement('th');
			col1.textContent = `Team ${teamA.team}`;
			header.appendChild(col1);
			// column 2 header
			const teamB = getTeamObject(team2, teams)
			const col2 = document.createElement('th');
			col2.textContent = `Team ${teamB.team}`;
			header.appendChild(col2);
			tableBody.appendChild(header);
			
			const maxEntries = Math.max(teamA.members.length, teamB.members.length);  
			for (t=0; t < maxEntries; t++) {
				const row = document.createElement('tr');

				const column1 = document.createElement('td');
				if (t+1 > teamA.members.length ) {
					column1.textContent = " ";
				  } else {
					column1.textContent = teamA.members[t];
				};
				row.appendChild(column1);
			
				const column2 = document.createElement('td');
				if (t+1 > teamB.members.length ) {
					column2.textContent = " ";
				  } else {
					column2.textContent = teamB.members[t];
				};
				row.appendChild(column2);
			
				tableBody.appendChild(row);
			};
		};

		document.getElementById('teamModal').style.display = 'block';
		
		// Position and show
		const content = document.getElementById('modalContent');
		positionModal(event, content);
		//modal.style.display = 'block';
	}
	
    function getTeamObject(teamLabel, teams) {
		// Extract the number from "Team x"
		const teamNumber = parseInt(teamLabel.replace('Team ', ''), 10);
		// Find the matching team object
		return teams.find(t => t.team === teamNumber);
	}	

function XXXshowTeamModal(event, teamNum) {
  const modal = document.getElementById("teamModal");
  const tbody = document.querySelector("#teamTable tbody");
  tbody.innerHTML = "";

  const team = teams.find(t => t.team === teamNum);

  const header = document.createElement("tr");
  const th = document.createElement("th");
  th.textContent = `Team ${teamNum}`;
  header.appendChild(th);
  tbody.appendChild(header);

  team.members.forEach(m => {
    const tr = document.createElement("tr");
    const td = document.createElement("td");
    td.textContent = m;
    tr.appendChild(td);
    tbody.appendChild(tr);
  });

  modal.style.display = "block";
  positionModal(event, document.getElementById("modalContent"));
}

function closeModal() {
  document.getElementById("teamModal").style.display = "none";
}

window.addEventListener("click", e => {
  if (e.target.id === "teamModal") closeModal();
});

function positionModal(event, modalContent) {
  let x = event.pageX + 10;
  let y = event.pageY + 10;
  modalContent.style.left = x + "px";
  modalContent.style.top = y + "px";
}

/* ---------------------------------------------------------
   SCHEDULE RENDERING
--------------------------------------------------------- */
function populateTeamFilter() {
  const select = document.getElementById("teamFilter");
  select.innerHTML = `<option value="all">Show All</option><option value="current" selected>Current Game</option>`;
  const uniqueTeams = [...new Set(games.flatMap(g => [g.teamA, g.teamB]))].sort();
  uniqueTeams.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    select.appendChild(opt);
  });
  select.onchange = filterSchedule;
}

function filterSchedule() {
  const val = document.getElementById("teamFilter").value;
  downloadTeamBtn.disabled = true;
  if (val === "current") {
	  // Start with games from today forward
	  filteredGames = games.filter(g => g.date >= currentDate);
    } else {
      filteredGames = games;	
	  if (val !== "all") {
		filteredGames = filteredGames.filter(
		  g => g.teamA === val || g.teamB === val);
		downloadTeamBtn.disabled = false;  
	  }
  }
  renderSchedule(filteredGames);
  selectGame(null);
}

function renderSchedule(data) {
  const tableDisplay = document.getElementById("tableDisplay");
  if (data.length === 0) {
    tableDisplay.innerHTML = "<p>No games.</p>";
    return;
  }

  const dates = [...new Set(data.map(g => g.date))].sort();
  const times24 = [...new Set(data.map(g => g.time24))].sort();

  // Map 24h -> 12h using first matching game (like bocce8)
  const timeMap = {};
  times24.forEach(t24 => {
    const g = data.find(x => x.time24 === t24);
	//timeMap[t24] = g ? g.time12 : t24;
    timeMap[t24] = g ? g.time12.replace(/:(\d{2})(?=\s*[AP]M)/i, "") : t24;
  });

  const pivot = {};
  data.forEach(g => {
    const key = `${g.date}-${g.time24}`;
    if (!pivot[key]) pivot[key] = [];
    pivot[key].push(g);
  });

  let html = `<table><thead><tr><th>Date</th>`;
  times24.forEach(t => html += `<th>${timeMap[t]}</th>`);
  html += `</tr></thead><tbody>`;

  dates.forEach(date => {
    html += `<tr><td>${date}</td>`;
    times24.forEach(t => {
      const key = `${date}-${t}`;
      const slot = pivot[key] || [];
      if (slot.length === 0) {
        html += `<td></td>`;
      } else {
        html += `<td style="vertical-align:top;">`;
        slot.forEach(g => {
		  const mytime = g.time12.replace(/:(\d{2})(?=\s*[AP]M)/i, "");
          html += `
            <div class="game-row"
                 data-game-id="${g.id}"
				 onclick='showTeamAt(event, "${g.teamA}", "${g.teamB}", ${g.id})'
				 style="border: 1px solid #ccc; padding: 5px; margin-bottom: 5px; cursor: pointer;">		
              <strong>${mytime}</strong><br>
              <strong>${g.court}</strong><br>
              ${g.teamA} vs ${g.teamB}
              <div style="font-size:0.8em;color:#569;">(Click for team roster)</div>
            </div>`;
        });
        html += `</td>`;
      }
    });
    html += `</tr>`;
  });

  html += `</tbody></table>`;
  tableDisplay.innerHTML = html;

  // Re‑apply selection highlight if needed
  if (selectedGameId !== null) selectGame(selectedGameId);
}


function extractTeamNum(label) {
  const m = label.match(/(\d+)/);
  return m ? parseInt(m[1]) : null;
}

function escapeICS(str) {
  return String(str).replace(/([,;])/g, '\\$1').replace(/\n/g, '\\n');
}

function formatICSDate(dateStr, time24Str) {
  const [y,m,d] = dateStr.split('-');
  const [h,min] = time24Str.split(':');
  return `${y}${m}${d}T${h}${min}00`;
}

function formatICSDateOnly(dateStr) {
  const [y,m,d] = dateStr.split('-');
  return `${y}${m}${d}`;
}

function generateIcs(type) {
  let selected = [];
  let fileName = '';
  
  if (type === 'team') {
  	const val = document.getElementById('teamFilter').value;
	if (!val) { alert('Choose a team first.'); return; }
	selected = games.filter(g => g.teamA === val || g.teamB === val);
	fileName = `${val}_games.ics`;
  }	else if (type === 'all') {
    const byDate = games.reduce((acc,g) => {
      (acc[g.date] = acc[g.date] || []).push(g);
      return acc;
    }, {});
    selected = Object.entries(byDate).map(([date, list]) => ({date, games:list}));
    fileName = 'all_games.ics';
  } else if (type === 'selected' && selectedGameId !== null) {
    const g = games.find(x => x.id === selectedGameId);
    if (!g) { alert('Selected game not found'); return; }
    selected.push(g);
    fileName = `game_${g.teamA}_vs_${g.teamB}_${g.date}.ics`;
  } else {
    alert('Select a game first.');
    return;
  }

  let ics = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Bocce League//EN`;

  if (type === 'all') {
    selected.forEach(day => {
      const dateOnly = formatICSDateOnly(day.date);
      const next = new Date(day.date);
      next.setDate(next.getDate()+1);
      const endDateOnly = formatICSDateOnly(
        `${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}-${String(next.getDate()).padStart(2,'0')}`
      );

      const descLines = day.games
        .sort((a,b)=>a.time24.localeCompare(b.time24))
        .map(g => `${g.time12} at ${g.court}: ${g.teamA} vs ${g.teamB}`)
        .join('\\n');

      ics += `
BEGIN:VEVENT
UID:${day.date}-ALLGAMES@bocce
DTSTART;VALUE=DATE:${dateOnly}
DTEND;VALUE=DATE:${endDateOnly}
SUMMARY:${escapeICS('Game Day Schedule: ' + day.date)}
DESCRIPTION:${escapeICS(descLines)}
LOCATION:Various Courts
END:VEVENT`;
    });
  } else if (type === 'team') {	
	selected.forEach(g => {
      const start = formatICSDate(g.date, g.time24);
      const startDt = new Date(`${g.date}T${g.time24}:00`);
      const endDt = new Date(startDt.getTime() + 45*60000);
      const endDateStr = `${endDt.getFullYear()}-${String(endDt.getMonth()+1).padStart(2,'0')}-${String(endDt.getDate()).padStart(2,'0')}`;
      const endTimeStr = `${String(endDt.getHours()).padStart(2,'0')}:${String(endDt.getMinutes()).padStart(2,'0')}`;
      const end = formatICSDate(endDateStr, endTimeStr);

    ics += `
BEGIN:VEVENT
UID:${g.id}-${g.date}-${g.time24}@bocce
DTSTART:${start}
DTEND:${end}
SUMMARY:${escapeICS(`Bocce: ${g.court}: ${g.teamA} vs ${g.teamB}`)}
DESCRIPTION:${escapeICS(`Teams: ${g.teamA} vs ${g.teamB}\\nLocation: ${g.court}\\nTime: ${g.time12}`)}
LOCATION:${escapeICS(g.court)}
END:VEVENT`;	
	});
  } else {
    const g = selected[0];
	console.log(g);
    const start = formatICSDate(g.date, g.time24);
    const startDt = new Date(`${g.date}T${g.time24}:00`);
    const endDt = new Date(startDt.getTime() + 45*60000);
    const endDateStr = `${endDt.getFullYear()}-${String(endDt.getMonth()+1).padStart(2,'0')}-${String(endDt.getDate()).padStart(2,'0')}`;
    const endTimeStr = `${String(endDt.getHours()).padStart(2,'0')}:${String(endDt.getMinutes()).padStart(2,'0')}`;
    const end = formatICSDate(endDateStr, endTimeStr);

    ics += `
BEGIN:VEVENT
UID:${g.id}-${g.date}-${g.time24}@bocce
DTSTART:${start}
DTEND:${end}
SUMMARY:${escapeICS(`Bocce: ${g.court}: ${g.teamA} vs ${g.teamB}`)}
DESCRIPTION:${escapeICS(`Teams: ${g.teamA} vs ${g.teamB}\\nLocation: ${g.court}\\nTime: ${g.time12}`)}
LOCATION:${escapeICS(g.court)}
END:VEVENT`;
  }

  ics += `
END:VCALENDAR`;

  const blob = new Blob([ics], {type:'text/calendar;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

</script>

</body>
</html>
